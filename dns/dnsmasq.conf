# dnsmasq configuration for VentoFanSim Docker containers
#
# This sidecar container resolves *.vento hostnames to their static
# container IPs on the 172.28.0.0/24 bridge network.
#
# On the host machine, point the .vento resolver at this container:
#
#   macOS — create /etc/resolver/vento containing:
#       nameserver 172.28.0.2
#
#   Linux (systemd-resolved) — add to /etc/systemd/resolved.conf:
#       [Resolve]
#       DNS=172.28.0.2
#       Domains=~vento
#   then: sudo systemctl restart systemd-resolved
#
# After either step, "ping fan1.vento" should resolve to 172.28.0.11.

# Authoritative for the .vento domain only — do not forward .vento queries
domain=vento
local=/vento/

# Static host records — return the loopback alias IPs that are reachable from
# the macOS host via Docker port mappings.  Do NOT use 172.28.0.x here: those
# are internal bridge IPs that are unreachable from the macOS host.
host-record=fan1.vento,127.0.0.11
host-record=fan2.vento,127.0.0.12
host-record=fan3.vento,127.0.0.13

# To add more fans, append lines here AND add matching services + port mappings
# in docker-compose.yml, then add the loopback alias on the host:
#   sudo ifconfig lo0 alias 127.0.0.14
# host-record=fan4.vento,127.0.0.14
# host-record=fan5.vento,127.0.0.15

# Forward all non-.vento queries upstream (Google DNS — change to your preference)
no-resolv
server=8.8.8.8
server=8.8.4.4

# Listen on all interfaces inside the container
interface=*
bind-interfaces

# Disable DHCP (DNS only)
no-dhcp-interface=*
